# scan 数据源配置
#
# GeckoTerminal + Moralis 双源配置（Phase 1 仅 BSC）

gecko_terminal:
  base_url: "https://api.geckoterminal.com/api/v2"
  rate_limit: 30          # requests/minute (free tier)
  network: "bsc"
  default_timeframe: "minute"
  default_aggregate: 5    # 5m candles

moralis:
  network: "bsc"
  default_limit: 100

# 扫描目标池
target_pools:
  - name: "pGVT_USDT"
    address: "0x5558e43eE316C45e6C842bC7aC4B770EED03c5C0"
    priority: 1
  - name: "sGVT_USDT"
    address: "0xBE1B08D1743f2C158165472Fa2fEB038E8DfaA9d"
    priority: 2

# 信号检测阈值
signal_thresholds:
  price_divergence_pct: 3.0     # 价差>3% 触发信号
  volume_spike_ratio: 5.0       # 交易量 >5x 均值触发
  lp_imbalance_ratio: 0.10      # 储备比 <10% 触发
  whale_threshold_usd: 500.0    # >$500 视为大额
  stale_data_seconds: 120.0     # 数据超过 2min 视为陈旧

# ── Arb 全网发现配置 ─────────────────────────────────
# ArbScanSkill (skill_arb_scan.py) 使用，与 MM 的 target_pools 独立
arb_discovery:
  strategies:
    - name: trending
      enabled: true
      max_pools: 20
    - name: new_pool
      enabled: true
      max_pools: 10

  # 最低门槛（低于此值不值得套利）
  min_tvl_usd: 10000
  min_volume_24h_usd: 5000
  max_fee_bps: 100

  # 质量打分阈值 → 决定是否持久化
  quality_thresholds:
    strong:
      min_signals: 2
      min_score: 70
    moderate:
      min_signals: 1
      min_score: 40

  # 持久化路径（相对 workspace root）
  output_root: "/workspaces/nexrur/docs/ai-skills/scan"
  max_pending: 50
